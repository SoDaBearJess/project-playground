name: Build and FTP deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-site/SoDaBearJess # your subfolder
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build # dist/ for Vite, build/ for

      - name: Assemble files to deploy
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p deploy
          cp -R react-site/SoDaBearJess/dist/* deploy/
          cp portfolio-fable.html portfolio-home.html deploy/

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          # protocol: ftps
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./deploy/ # trailing slash matters
          server-dir: public_html/ # trailing slash matters
